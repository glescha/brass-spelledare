<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brass Birmingham - Berättaren</title>
    <style>
        :root { --brass: #d4af37; --bg: #070605; --text: #e6e1d8; }
        body { background: var(--bg); color: var(--text); font-family: serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        #chat-output { width: 100%; max-width: 700px; height: 500px; border: 1px solid var(--brass); background: #100e0c; padding: 20px; overflow-y: auto; box-shadow: inset 0 0 15px black; }
        .agent-answer { border-left: 3px solid var(--brass); padding-left: 15px; margin-bottom: 20px; line-height: 1.6; white-space: pre-wrap; }
        .user-message { color: var(--brass); font-weight: bold; margin-bottom: 10px; text-align: right; }
        .controls { width: 100%; max-width: 700px; display: flex; gap: 10px; margin-top: 20px; }
        input { flex: 1; padding: 15px; background: #1a1714; border: 1px solid var(--brass); color: white; outline: none; }
        button { padding: 15px 30px; background: var(--brass); border: none; font-weight: bold; cursor: pointer; }
        #splash { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="splash">
        <h1 style="color:var(--brass); letter-spacing: 5px;">BRASS BIRMINGHAM</h1>
        <p>Välj din informationsnivå för det industriella manifestet:</p>
        <div style="display:flex; gap: 15px;">
            <button onclick="startApp(1)">1: GRUND</button>
            <button onclick="startApp(2)">2: AVANCERAD</button>
            <button onclick="startApp(3)">3: TOTAL</button>
        </div>
    </div>

    <div id="chat-output"></div>
    <div class="controls">
        <input type="text" id="user-input" placeholder="Ställ en fråga till maskineriet...">
        <button onclick="handleSend()">SKICKA</button>
    </div>

    <script>
        let currentLevel = 1;
        function startApp(l) { 
            currentLevel = l; 
            document.getElementById('splash').classList.add('hidden'); 
            sendToAgent("Inled spelet och hälsa oss välkomna."); 
        }

        async function handleSend() {
            const input = document.getElementById('user-input');
            const msg = input.value.trim();
            if (!msg) return;
            document.getElementById('chat-output').innerHTML += `<div class="user-message">NI: ${msg}</div>`;
            input.value = '';
            await sendToAgent(msg);
        }

        async function sendToAgent(message) {
            const output = document.getElementById('chat-output');
            const thought = document.createElement('div');
            thought.style.color = '#888';
            thought.textContent = "MASKINEN ANALYSERAR DATA...";
            output.appendChild(thought);
            output.scrollTop = output.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userMessage: message, infoLevel: currentLevel })
                });
                const data = await response.json();
                output.removeChild(thought);
                
                const answerDiv = document.createElement('div');
                answerDiv.className = 'agent-answer';
                output.appendChild(answerDiv);

                // Telegraf-effekt
                let i = 0;
                const text = data.reply || "[INGET SVAR FRÅN AGENTEN]";
                const timer = setInterval(() => {
                    if (i < text.length) {
                        answerDiv.innerHTML += text.charAt(i);
                        i++;
                        output.scrollTop = output.scrollHeight;
                    } else { clearInterval(timer); }
                }, 15);
            } catch (e) {
                output.innerHTML += `<div class="agent-answer">[SYSTEMHALT: KOMMUNIKATIONSFEL. Kontrollera API-nyckeln i Vercel.]</div>`;
            }
        }
        document.getElementById('user-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
