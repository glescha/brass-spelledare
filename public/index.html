<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brass Birmingham - Berättaren</title>
    <style>
        body { background: #070605; color: #e6e1d8; font-family: serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        #chat-output { width: 90%; max-width: 700px; height: 400px; border: 1px solid #d4af37; padding: 20px; overflow-y: auto; background: #100e0c; margin: 20px 0; }
        input { width: 70%; padding: 10px; background: #1a1714; border: 1px solid #d4af37; color: white; }
        button { padding: 10px 20px; background: #d4af37; border: none; cursor: pointer; font-weight: bold; }
        .user-msg { color: #d4af37; margin-top: 10px; font-weight: bold; }
        .agent-msg { line-height: 1.6; border-left: 2px solid #4a3d12; padding-left: 10px; margin-bottom: 15px; }
        #splash { position: fixed; inset: 0; background: #070605; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="splash">
        <h1 style="color:#d4af37">BRASS BIRMINGHAM</h1>
        <p>Välj informationsnivå:</p>
        <button onclick="start(1)">1: GRUND</button>
        <button onclick="start(2)">2: AVANCERAD</button>
        <button onclick="start(3)">3: TOTAL</button>
    </div>
    <div id="chat-output"></div>
    <div style="width: 100%; display: flex; justify-content: center; gap: 10px;">
        <input type="text" id="input" placeholder="Fråga Berättaren...">
        <button onclick="send()">SKICKA</button>
    </div>
    <script>
        let lvl = 1;
        function start(l) { lvl = l; document.getElementById('splash').classList.add('hidden'); sendToAgent("Hälsa oss välkomna."); }
        function send() { const i = document.getElementById('input'); if(!i.value) return; document.getElementById('chat-output').innerHTML += `<div class='user-msg'>NI: ${i.value}</div>`; sendToAgent(i.value); i.value = ''; }
        async function sendToAgent(m) {
            const out = document.getElementById('chat-output');
            const t = document.createElement('div'); t.textContent = "MASKINEN TÄNKER..."; out.appendChild(t);
            try {
                const r = await fetch('/api/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ userMessage: m, infoLevel: lvl })});
                const d = await r.json(); out.removeChild(t);
                const a = document.createElement('div'); a.className = 'agent-msg'; out.appendChild(a);
                let x = 0; const txt = d.reply || "[INGET SVAR]";
                const timer = setInterval(() => { if(x < txt.length) { a.innerHTML += txt.charAt(x); x++; out.scrollTop = out.scrollHeight; } else clearInterval(timer); }, 15);
            } catch(e) { out.innerHTML += "<div>[FEL I LEDNINGARNA]</div>"; }
        }
    </script>
</body>
</html>
